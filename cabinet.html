<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaLMur — Мой кабинет</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #EBE3D8; color: #2D2D2D; }
        
        .cabinet-header { background: #8B6B4A; color: white; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
        .cabinet-header a { color: white; text-decoration: none; font-size: 14px; }
        .cabinet-header .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .cabinet-title { font-size: 24px; margin-bottom: 20px; color: #3C2A1E; }
        
        .btn-add { display: inline-block; padding: 12px 24px; background: #8B6B4A; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin-bottom: 20px; transition: all 0.2s; }
        .btn-add:hover { background: #6B4F37; transform: translateY(-1px); }
        
        .dresses-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        
        .dress-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 15px rgba(0,0,0,0.08); border: 1px solid #E0D5C5; transition: transform 0.2s, box-shadow 0.2s; }
        .dress-card:hover { transform: translateY(-3px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
        
        .dress-card-img { width: 100%; height: 240px; object-fit: cover; background: #f0e6dd; }
        .dress-card-body { padding: 15px; }
        .dress-card-body h3 { font-size: 16px; margin-bottom: 5px; color: #3C2A1E; }
        .dress-card-body .price { color: #8B6B4A; font-weight: 700; font-size: 20px; margin-bottom: 5px; }
        .dress-card-body .info { font-size: 12px; color: #999; margin: 3px 0; }
        .dress-card-body .category-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 8px; }
        .badge-wedding { background: #FDE8E8; color: #C62828; }
        .badge-evening { background: #E8EAF6; color: #283593; }
        .badge-suit { background: #E8F5E9; color: #2E7D32; }
        .badge-accessories { background: #FFF3E0; color: #E65100; }
        
        .dress-card-actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn-edit { flex: 1; padding: 8px; background: #8B6B4A; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; transition: background 0.2s; }
        .btn-edit:hover { background: #6B4F37; }
        .btn-delete-card { flex: 1; padding: 8px; background: #fff; color: #C62828; border: 1px solid #C62828; border-radius: 6px; cursor: pointer; font-size: 13px; text-align: center; transition: all 0.2s; }
        .btn-delete-card:hover { background: #C62828; color: #fff; }
        
        .empty-state { text-align: center; padding: 60px; }
        .empty-state p { font-size: 18px; color: #999; margin-bottom: 15px; }
        
        .toast-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .toast-backdrop--show { opacity: 1; pointer-events: all; }
        .toast-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        .toast-overlay--show { opacity: 1; pointer-events: all; }
        .toast { background: #fff; border-radius: 20px; padding: 32px 36px; text-align: center; max-width: 440px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .toast__icon-wrap { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; }
        .toast--success .toast__icon-wrap { background: #E8F5E9; color: #4CAF50; }
        .toast--error .toast__icon-wrap { background: #FFEBEE; color: #f44336; }
        .toast__divider { width: 48px; height: 3px; border-radius: 2px; margin: 0 auto 16px; }
        .toast--success .toast__divider { background: #8B6B4A; }
        .toast--error .toast__divider { background: #E57373; }
        .toast__message { font-size: 15px; line-height: 1.5; color: #3C2A1E; margin-bottom: 20px; font-weight: 500; }
        .toast__close { background: #F4EDE4; border: none; padding: 10px 32px; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; color: #5C3D2E; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: #fff; border-radius: 12px; width: 90%; max-width: 550px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal__header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; background: #8B6B4A; color: #fff; border-radius: 12px 12px 0 0; }
        .modal__title { font-size: 18px; }
        .modal__close { background: none; border: none; font-size: 28px; cursor: pointer; color: rgba(255,255,255,0.8); }
        .modal__close:hover { color: #fff; }
        .modal__body { padding: 20px 24px 24px; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; font-weight: 700; color: #8B6B4A; margin-bottom: 5px; }
        .form-input, .form-select { width: 100%; padding: 10px; border: 2px solid #DDD0C0; border-radius: 8px; font-size: 14px; outline: none; }
        .form-input:focus, .form-select:focus { border-color: #8B6B4A; }
        .btn-confirm { width: 100%; padding: 14px; background: #8B6B4A; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .btn-confirm:hover { background: #6B4F37; }

        @media (max-width: 900px) {
            .dresses-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .dresses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="cabinet-header">
        <span class="logo">GalaLMur — Мой кабинет</span>
        <div>
            <a href="/">← В каталог</a>
            <a href="#" onclick="logout()" style="margin-left:20px;">Выйти</a>
        </div>
    </div>

    <div class="container">
        <h2 class="cabinet-title">Мои наряды</h2>
        <button class="btn-add" onclick="openAddDressModal()">+ Добавить наряд</button>
        
        <div id="dressesContainer">
            <div class="empty-state"><p>Загрузка...</p></div>
        </div>
    </div>

    <!-- Модалка -->
    <div class="modal-overlay" id="dressFormModal">
        <div class="modal">
            <div class="modal__header">
                <h3 class="modal__title" id="dressFormTitle">Добавить наряд</h3>
                <button class="modal__close" onclick="closeDressFormModal()">&times;</button>
            </div>
            <div class="modal__body">
                <input type="hidden" id="editDressId">
                <div class="form-group"><label class="form-label">Название *</label><input type="text" id="dressTitle" class="form-input" placeholder="Свадебное платье «Мечта»"></div>
                <div class="form-group"><label class="form-label">Описание *</label><textarea id="dressDesc" class="form-input" rows="2" placeholder="Опишите наряд..."></textarea></div>
                <div class="form-group"><label class="form-label">Цена за день (₽) *</label><input type="number" id="dressPrice" class="form-input" placeholder="15000"></div>
                <div class="form-group"><label class="form-label">Категория</label><select id="dressCategory" class="form-select"><option value="wedding">Свадебное платье</option><option value="evening">Вечернее платье</option><option value="suit">Мужской костюм</option><option value="accessories">Аксессуары</option></select></div>
                <div class="form-group"><label class="form-label">Доступные размеры *</label><div style="display:flex;gap:10px;flex-wrap:wrap;"><label style="display:flex;align-items:center;gap:5px;font-size:14px;"><input type="checkbox" class="dress-size" value="S"> S (44)</label><label style="display:flex;align-items:center;gap:5px;font-size:14px;"><input type="checkbox" class="dress-size" value="M"> M (48)</label><label style="display:flex;align-items:center;gap:5px;font-size:14px;"><input type="checkbox" class="dress-size" value="L"> L (50)</label><label style="display:flex;align-items:center;gap:5px;font-size:14px;"><input type="checkbox" class="dress-size" value="XL"> XL (52)</label></div></div>
                <div class="form-group"><label class="form-label">Фото <span id="photoHint"></span></label><input type="file" id="dressImage" class="form-input" accept="image/*"></div>
                <button class="btn-confirm" id="saveDressBtn" onclick="saveDress()">Добавить наряд</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-backdrop" id="toastBackdrop"></div>
    <div class="toast-overlay" id="toastOverlay">
        <div class="toast" id="toast">
            <div class="toast__icon-wrap" id="toastIcon"></div>
            <div class="toast__divider"></div>
            <div class="toast__message" id="toastMessage"></div>
            <button class="toast__close" id="toastClose">Понятно</button>
        </div>
    </div>

    <script>
        let editingId = null;
        const toastOverlay = document.getElementById('toastOverlay');
        const toastBackdrop = document.getElementById('toastBackdrop');
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toastIcon');
        const toastMessage = document.getElementById('toastMessage');
        const toastClose = document.getElementById('toastClose');
        let toastTimer = null;

        function showToast(message, isError = false) {
            if (toastTimer) clearTimeout(toastTimer);
            toast.classList.remove('toast--success', 'toast--error');
            if (isError) { toast.classList.add('toast--error'); toastIcon.textContent = '✗'; }
            else { toast.classList.add('toast--success'); toastIcon.textContent = '✓'; }
            toastMessage.textContent = message;
            toastOverlay.classList.add('toast-overlay--show');
            toastBackdrop.classList.add('toast-backdrop--show');
            toastTimer = setTimeout(hideToast, 4000);
        }
        function hideToast() { toastOverlay.classList.remove('toast-overlay--show'); toastBackdrop.classList.remove('toast-backdrop--show'); }
        toastClose.addEventListener('click', hideToast);
        toastBackdrop.addEventListener('click', hideToast);

        async function checkAuth() {
            const res = await fetch('/api/me'); const data = await res.json();
            if (!data.loggedIn) { window.location.href = '/'; }
        }

        function getCategoryBadge(category) {
            const map = { wedding: 'badge-wedding', evening: 'badge-evening', suit: 'badge-suit', accessories: 'badge-accessories' };
            const labels = { wedding: 'Свадебное', evening: 'Вечернее', suit: 'Костюм', accessories: 'Аксессуары' };
            return `<span class="category-badge ${map[category] || ''}">${labels[category] || category}</span>`;
        }

        async function loadMyDresses() {
            const res = await fetch('/api/my-dresses'); const data = await res.json();
            const container = document.getElementById('dressesContainer');
            
            if (data.dresses.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>У вас пока нет нарядов</p><p style="font-size:14px;">Нажмите «Добавить наряд» чтобы разместить первый</p></div>';
                return;
            }

            container.innerHTML = '<div class="dresses-grid">' + data.dresses.map(d => `
                <div class="dress-card">
                    <img src="${d.image_url || ''}" alt="${d.title}" class="dress-card-img" onerror="this.style.display='none';">
                    <div class="dress-card-body">
                        <h3>${d.title}</h3>
                        <p class="price">${d.price_per_day.toLocaleString('ru-RU')} ₽ / день</p>
                        <p class="info">${d.description}</p>
                        <p class="info">Размеры: ${d.sizes}</p>
                        ${getCategoryBadge(d.category)}
                        <div class="dress-card-actions">
                            <button class="btn-edit" onclick="editDress(${d.id})">✎ Изменить</button>
                            <button class="btn-delete-card" onclick="deleteDress(${d.id})">✕ Удалить</button>
                        </div>
                    </div>
                </div>
            `).join('') + '</div>';
        }

        function openAddDressModal() {
            editingId = null;
            document.getElementById('dressFormTitle').textContent = 'Добавить наряд';
            document.getElementById('saveDressBtn').textContent = 'Добавить наряд';
            document.getElementById('editDressId').value = '';
            document.getElementById('dressTitle').value = '';
            document.getElementById('dressDesc').value = '';
            document.getElementById('dressPrice').value = '';
            document.getElementById('dressCategory').value = 'wedding';
            document.getElementById('dressImage').value = '';
            document.getElementById('photoHint').textContent = '';
            document.querySelectorAll('.dress-size').forEach(cb => cb.checked = false);
            document.getElementById('dressFormModal').style.display = 'flex';
        }

        function closeDressFormModal() { document.getElementById('dressFormModal').style.display = 'none'; }

        async function editDress(id) {
            const res = await fetch('/api/my-dresses'); const data = await res.json();
            const dress = data.dresses.find(d => d.id === id);
            if (!dress) return;
            editingId = id;
            document.getElementById('dressFormTitle').textContent = 'Редактировать наряд';
            document.getElementById('saveDressBtn').textContent = 'Сохранить';
            document.getElementById('editDressId').value = id;
            document.getElementById('dressTitle').value = dress.title;
            document.getElementById('dressDesc').value = dress.description;
            document.getElementById('dressPrice').value = dress.price_per_day;
            document.getElementById('dressCategory').value = dress.category;
            document.getElementById('photoHint').textContent = '(оставьте пустым, чтобы не менять)';
            const sizes = dress.sizes.split(',').map(s => s.trim());
            document.querySelectorAll('.dress-size').forEach(cb => { cb.checked = sizes.includes(cb.value); });
            document.getElementById('dressFormModal').style.display = 'flex';
        }

        async function saveDress() {
            const title = document.getElementById('dressTitle').value.trim();
            const description = document.getElementById('dressDesc').value.trim();
            const price = document.getElementById('dressPrice').value.trim();
            const category = document.getElementById('dressCategory').value;
            const imageFile = document.getElementById('dressImage').files[0];
            const sizes = [];
            document.querySelectorAll('.dress-size:checked').forEach(cb => sizes.push(cb.value));

            if (!title) { showToast('Введите название', true); return; }
            if (!description) { showToast('Введите описание', true); return; }
            if (!price || parseInt(price) <= 0) { showToast('Цена должна быть больше 0 ₽', true); return; }
            if (sizes.length === 0) { showToast('Выберите размеры', true); return; }
            if (!editingId && !imageFile) { showToast('Загрузите фото', true); return; }

            const formData = new FormData();
            formData.append('title', title); formData.append('description', description);
            formData.append('price_per_day', price); formData.append('category', category);
            formData.append('sizes', sizes.join(', '));
            if (imageFile) formData.append('image', imageFile);

            const url = editingId ? '/api/dresses/' + editingId : '/api/dresses';
            const method = editingId ? 'PUT' : 'POST';
            const res = await fetch(url, { method, body: formData });
            const data = await res.json();
            
            if (data.success) { showToast(editingId ? 'Наряд обновлён!' : 'Наряд добавлен!', false); closeDressFormModal(); loadMyDresses(); }
            else { showToast(data.message, true); }
        }

        async function deleteDress(id) {
            if (!confirm('Удалить этот наряд?')) return;
            await fetch('/api/dresses/' + id, { method: 'DELETE' });
            showToast('Наряд удалён', false);
            loadMyDresses();
        }

        async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/'; }

        document.getElementById('dressFormModal').addEventListener('click', function(e) { if (e.target === this) closeDressFormModal(); });

        checkAuth();
        loadMyDresses();
    </script>
</body>
</html>
