<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaLMur — Админ-панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #EBE3D8; color: #2D2D2D; }
        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }
        
        .header { background: #8B6B4A; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .header a { color: white; text-decoration: none; font-size: 14px; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }

        .tabs { display: flex; gap: 5px; margin: 20px 0; background: #fff; border-radius: 10px; padding: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tab-btn { padding: 12px 24px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; color: #999; transition: all 0.2s; }
        .tab-btn.active { background: #8B6B4A; color: #fff; }
        .tab-btn:hover:not(.active) { background: #F4EDE4; color: #8B6B4A; }

        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-card h3 { font-size: 28px; color: #8B6B4A; }
        .stat-card p { font-size: 13px; color: #999; margin-top: 5px; }

        .filters { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 18px; border: 1px solid #DDD0C0; background: #fff; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .filter-btn.active { background: #8B6B4A; color: #fff; border-color: #8B6B4A; }
        .filter-btn:hover { border-color: #8B6B4A; }

        .card-table { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); width: 100%; border-collapse: collapse; }
        .card-table th { background: #8B6B4A; color: #fff; padding: 12px 14px; font-size: 13px; text-align: left; }
        .card-table td { padding: 10px 14px; border-bottom: 1px solid #F0E6DD; font-size: 13px; }
        .card-table tr:hover { background: #FDFBF8; }

        .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-new { background: #E3F2FD; color: #1565C0; }
        .badge-paid { background: #E8F5E9; color: #2E7D32; }
        .badge-cancelled { background: #FFEBEE; color: #C62828; }
        .badge-admin { background: #FFF3E0; color: #E65100; }
        .badge-user { background: #F5F5F5; color: #616161; }

        .btn-sm { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-delete { background: #C62828; color: #fff; }
        .btn-delete:hover { background: #B71C1C; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 16px 24px; border-radius: 10px; z-index: 2000; display: none; color: #fff; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .toast.show { display: block; animation: slideIn 0.3s ease; }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #f44336; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 900px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .card-table { font-size: 11px; }
            .card-table th, .card-table td { padding: 8px 6px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">GalaLMur Admin</span>
        <div>
            <a href="/">← На сайт</a>
            <a href="#" onclick="logout()" style="margin-left:20px;">Выйти</a>
        </div>
    </div>

    <div class="container">
        <h2 style="margin-top:20px;">Панель управления</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchAdminTab('bookings')">Заказы</button>
            <button class="tab-btn" onclick="switchAdminTab('users')">Пользователи</button>
        </div>

        <div class="stats" id="statsContainer"></div>

        <div class="tab-panel active" id="tab-bookings">
            <div class="filters" id="bookingFilters">
                <button class="filter-btn active" onclick="filterBookings('all')">Все</button>
                <button class="filter-btn" onclick="filterBookings('new')">Новые</button>
                <button class="filter-btn" onclick="filterBookings('paid')">Оплачены</button>
                <button class="filter-btn" onclick="filterBookings('cancelled')">Отменены</button>
            </div>
            <div style="overflow-x:auto;">
                <table class="card-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Клиент</th>
                            <th>Платье</th>
                            <th>Размер</th>
                            <th>Даты</th>
                            <th>Дней</th>
                            <th>Сумма</th>
                            <th>Комиссия</th>
                            <th>Статус</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="bookingsBody">
                        <tr><td colspan="10" style="text-align:center;padding:30px;">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="tab-panel" id="tab-users">
            <div style="overflow-x:auto;">
                <table class="card-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>ФИО</th>
                            <th>Email</th>
                            <th>Телефон</th>
                            <th>Роль</th>
                            <th>Дата регистрации</th>
                            <th>Заказов</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr><td colspan="8" style="text-align:center;padding:30px;">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let allBookings = [];
        let currentBookingFilter = 'all';

        async function checkAdmin() {
            const res = await fetch('/api/admin/check');
            const data = await res.json();
            if (!data.admin) { alert('Доступ запрещён!'); window.location.href = '/'; }
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadBookings() {
            const res = await fetch('/api/admin/bookings');
            const data = await res.json();
            if (!data.success) { alert('Доступ запрещён!'); window.location.href = '/'; return; }
            allBookings = data.bookings;

            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card"><h3>${data.stats.total}</h3><p>Всего заказов</p></div>
                <div class="stat-card"><h3 style="color:#1565C0;">${data.stats.new_count}</h3><p>Новых</p></div>
                <div class="stat-card"><h3 style="color:#2E7D32;">${data.stats.paid_count}</h3><p>Оплачены</p></div>
                <div class="stat-card"><h3 style="color:#C62828;">${data.stats.cancelled_count}</h3><p>Отменены</p></div>
            `;

            renderBookings();
        }

        function renderBookings() {
            const filtered = currentBookingFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentBookingFilter);
            const tbody = document.getElementById('bookingsBody');

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:30px;color:#999;">Нет заказов</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(b => {
                let badgeClass = 'badge-new', statusText = 'Новый';
                if (b.status === 'paid') { badgeClass = 'badge-paid'; statusText = 'Оплачен'; }
                if (b.status === 'cancelled') { badgeClass = 'badge-cancelled'; statusText = 'Отменён'; }

                return `
                    <tr>
                        <td>#${b.id}</td>
                        <td>${b.full_name}<br><small style="color:#999;">${b.email}</small></td>
                        <td>${b.dress}</td>
                        <td>${b.size}</td>
                        <td>${b.date_start} — ${b.date_end}</td>
                        <td>${b.days}</td>
                        <td>${b.total}</td>
                        <td>${b.commission}</td>
                        <td><span class="badge ${badgeClass}">${statusText}</span></td>
                        <td><button class="btn-sm btn-delete" onclick="deleteBooking(${b.id})">Удалить</button></td>
                    </tr>
                `;
            }).join('');
        }

        function filterBookings(filter) {
            currentBookingFilter = filter;
            document.querySelectorAll('#bookingFilters .filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderBookings();
        }

        async function deleteBooking(id) {
            if (!confirm('Удалить заказ #' + id + '?')) return;
            await fetch('/api/bookings/' + id, { method: 'DELETE' });
            showToast('Заказ удалён');
            loadBookings();
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const data = await res.json();
            const tbody = document.getElementById('usersBody');

            if (!data.success || data.users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:#999;">Нет пользователей</td></tr>';
                return;
            }

            tbody.innerHTML = data.users.map(u => `
                <tr>
                    <td>#${u.id}</td>
                    <td>${u.full_name}</td>
                    <td>${u.email}</td>
                    <td>${u.phone || '—'}</td>
                    <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role === 'admin' ? 'Админ' : 'Клиент'}</span></td>
                    <td>${u.created_at}</td>
                    <td>${u.order_count || 0}</td>
                    <td>
                        ${u.role !== 'admin' 
                            ? `<button class="btn-sm" style="background:#8B6B4A;color:#fff;" onclick="makeAdmin(${u.id})">Сделать админом</button>`
                            : `<button class="btn-sm" style="background:#E65100;color:#fff;" onclick="removeAdmin(${u.id})">Убрать админа</button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        async function makeAdmin(id) {
            await fetch('/api/admin/users/' + id + '/role', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'admin' })
            });
            showToast('Пользователь стал админом!');
            loadUsers();
        }

        async function removeAdmin(id) {
            await fetch('/api/admin/users/' + id + '/role', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: 'user' })
            });
            showToast('Админ разжалован');
            loadUsers();
        }

        function showToast(msg, error = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + (error ? 'error' : 'success');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        }

        checkAdmin();
        loadBookings();
        loadUsers();
    </script>
</body>
</html>
